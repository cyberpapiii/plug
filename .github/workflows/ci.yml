name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  MSRV: "1.86.0"

jobs:
  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest       # ARM (Apple Silicon)
          - os: ubuntu-latest      # x86_64 Linux
          # Windows disabled — daemon uses Unix sockets (future: named pipes)
          # - os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  cross-check:
    name: Cross-check (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            packages: musl-tools
          - target: aarch64-unknown-linux-gnu
            packages: gcc-aarch64-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation toolchain
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --target ${{ matrix.target }}

  binary-size:
    name: Binary size gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p plug
      - name: Check binary size < 10MB
        run: |
          SIZE=$(stat --format=%s target/release/plug)
          echo "Binary size: $SIZE bytes ($(( SIZE / 1024 / 1024 )) MB)"
          if [ "$SIZE" -gt 10485760 ]; then
            echo "::error::Binary size ${SIZE} exceeds 10MB limit"
            exit 1
          fi

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans sources
