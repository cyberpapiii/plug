name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
          # Windows disabled: the daemon uses Unix sockets.

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: contains(matrix.target, 'aarch64-unknown-linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p plug-mcp

      - name: Package cargo-dist-compatible archive
        shell: bash
        run: |
          set -euo pipefail
          archive="plug-mcp-${{ matrix.target }}.tar.gz"
          staging="plug-mcp-${{ matrix.target }}"
          mkdir -p "${staging}"
          cp "target/${{ matrix.target }}/release/plug" "${staging}/"
          cp README.md LICENSE CHANGELOG.md "${staging}/"
          tar czf "${archive}" "${staging}"
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  publish:
    name: Publish GitHub release and Homebrew tap
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binary archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: archive-*
          merge-multiple: true

      - name: Install cargo-dist
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build global cargo-dist artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/distrib
          cp artifacts/plug-mcp-*.tar.gz target/distrib/
          dist build --artifacts=global --tag "$TAG" --allow-dirty
          cp target/distrib/plug-mcp-installer.sh artifacts/
          cp target/distrib/source.tar.gz artifacts/
          cp target/distrib/source.tar.gz.sha256 artifacts/

      - name: Generate Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          arm_macos_sha=$(sha256sum plug-mcp-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          intel_macos_sha=$(sha256sum plug-mcp-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          arm_linux_sha=$(sha256sum plug-mcp-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          intel_linux_sha=$(sha256sum plug-mcp-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          version="${TAG#v}"
          cat > plug.rb <<EOF
          class Plug < Formula
            desc "MCP multiplexer - one config, every AI client connected, every server shared"
            homepage "https://github.com/cyberpapiii/plug"
            version "${version}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/cyberpapiii/plug/releases/download/${TAG}/plug-mcp-aarch64-apple-darwin.tar.gz"
                sha256 "${arm_macos_sha}"
              else
                url "https://github.com/cyberpapiii/plug/releases/download/${TAG}/plug-mcp-x86_64-apple-darwin.tar.gz"
                sha256 "${intel_macos_sha}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/cyberpapiii/plug/releases/download/${TAG}/plug-mcp-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${arm_linux_sha}"
              else
                url "https://github.com/cyberpapiii/plug/releases/download/${TAG}/plug-mcp-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${intel_linux_sha}"
              end
            end

            def install
              bin.install "plug"
            end

            test do
              assert_match "plug ${version}", shell_output("#{bin}/plug --version")
            end
          end
          EOF
          ruby -c plug.rb

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum \
            plug-mcp-*.tar.gz \
            source.tar.gz \
            source.tar.gz.sha256 \
            plug-mcp-installer.sh \
            plug.rb > checksums.sha256
          cat checksums.sha256

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub release
        shell: bash
        run: |
          gh release create "$TAG" \
            --title "plug $TAG" \
            --notes-file RELEASE_NOTES.md \
            artifacts/plug-mcp-*.tar.gz \
            artifacts/source.tar.gz \
            artifacts/source.tar.gz.sha256 \
            artifacts/plug-mcp-installer.sh \
            artifacts/plug.rb \
            artifacts/checksums.sha256

      - name: Publish Homebrew formula
        uses: actions/checkout@v4
        with:
          repository: cyberpapiii/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Commit Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          cp artifacts/plug.rb homebrew-tap/plug.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plug.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date"
          else
            git commit -m "plug ${TAG#v}"
            git push
          fi
