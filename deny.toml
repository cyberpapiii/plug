[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
]

[advisories]
version = 2
ignore = [
    # Unmaintained crates that have no replacement yet
    # Review periodically
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
